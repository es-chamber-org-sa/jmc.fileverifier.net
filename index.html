<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Verified</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            background: white;
            max-width: 450px;
            width: 100%;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            text-align: center;
        }
        
        .status-title {
            color: #2ecc71;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .generated-date {
            color: #7f8c8d;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .section-heading {
            color: #000000;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        /* Exact Table Design */
        .verification-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
            text-align: left;
            border: 1px solid #e2e8f0;
        }
        .verification-table tr {
            border-bottom: 1px solid #e2e8f0;
        }
        .verification-table tr:last-child {
            border-bottom: none;
        }
        .verification-table td {
            padding: 12px 15px;
            font-size: 14px;
            vertical-align: middle;
        }
        .verification-table td.label {
            background-color: #f8fafc;
            font-weight: 700;
            color: #2d3748;
            width: 35%;
            border-right: 1px solid #e2e8f0;
        }
        .verification-table td.value {
            color: #4a5568;
            font-weight: 500;
            word-break: break-word;
        }

        /* Blue Download Button */
        .btn-download {
            display: inline-block;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            padding: 12px 35px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 15px;
            transition: background-color 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,123,255,0.2);
        }
        .btn-download:hover {
            background-color: #0056b3;
        }
        
        .loading-text {
            color: #7f8c8d;
            font-size: 14px;
            font-style: italic;
        }
        .error-container {
            color: #e74c3c;
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="status-title" id="status-text">QR Code Verified</div>
    <div class="generated-date" id="live-date">Checking Registry...</div>
    
    <div class="section-heading">Information stored in the QR:</div>
    
    <table class="verification-table">
        <tr>
            <td class="label">Clinic</td>
            <td class="value" id="data-clinic">Loading...</td>
        </tr>
        <tr>
            <td class="label">Patient ID</td>
            <td class="value" id="data-patient-id">Loading...</td>
        </tr>
        <tr>
            <td class="label">Patient Name</td>
            <td class="value" id="data-name">Loading...</td>
        </tr>
        <tr>
            <td class="label">Age</td>
            <td class="value" id="data-age">Loading...</td>
        </tr>
        <tr>
            <td class="label">Gender</td>
            <td class="value" id="data-gender">Loading...</td>
        </tr>
    </table>

    <a id="download-btn" class="btn-download" style="display: none;">Download File</a>
    <div id="status-msg" class="loading-text">Fetching secure data...</div>
</div>

<script>
    // 🛠️ আপনার গুগল শিটের আসল লিংকটি এখানে দেওয়া আছে
    const GOOGLE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/1TJW89LtijictTE4mEQICtobVBgoHy0Szco6C3_aUHWE/edit?gid=0#gid=0'; 

    const baseSheetUrl = GOOGLE_SHEET_URL.replace(/\/edit.*/, '');
    const SHEET_URL = `${baseSheetUrl}/gviz/tq?tqx=out:json`;

    // URL থেকে আইডি (?id=1603245) রিড করা, যা সরাসরি Patient ID কলামে খুঁজবে
    const urlParams = new URLSearchParams(window.location.search);
    const searchId = urlParams.get('id');

    // Live Date & Time
    const options = { year: 'numeric', month: 'short', day: 'numeric' };
    document.getElementById('live-date').innerText = "Generated on: " + new Date().toLocaleDateString('en-GB', options).replace(/ /g, '-') + " " + new Date().toLocaleTimeString('en-GB');

    // 🧮 জন্মতারিখ ইনপুট নিয়ে বয়স (Y, M, D) বের করার অটোমেটিক ফাংশন
    function calculateExactAge(dobString) {
        if (!dobString) return 'N/A';
        
        let dob = new Date(dobString);
        
        // গুগল শিট থেকে আসা ডেট টেক্সট স্ট্রাকচার ক্লিনিং
        if (isNaN(dob.getTime())) {
            if (dobString.includes('Date')) {
                const parts = dobString.match(/\d+/g);
                if (parts && parts.length >= 3) {
                    dob = new Date(parts[0], parts[1], parts[2]);
                }
            } else {
                return dobString; 
            }
        }

        let now = new Date();
        
        let years = now.getFullYear() - dob.getFullYear();
        let months = now.getMonth() - dob.getMonth();
        let days = now.getDate() - dob.getDate();

        if (days < 0) {
            months--;
            let prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
            days += prevMonth.getDate();
        }

        if (months < 0) {
            years--;
            months += 12;
        }

        return `${years} Y(s), ${months} M(s) ${days} D(s)`;
    }

    if (searchId) {
        fetch(SHEET_URL)
            .then(res => res.text())
            .then(rawText => {
                const jsonClean = JSON.parse(rawText.substr(47).slice(0, -2));
                const cols = jsonClean.table.cols;
                const rows = jsonClean.table.rows;
                
                let clinicIdx = -1, patientIdIdx = -1, nameIdx = -1, ageIdx = -1, genderIdx = -1;
                
                // আপনার রিকোয়ারমেন্ট অনুযায়ী কলামের নাম ম্যাচিং ট্র্যাকার
                cols.forEach((col, index) => {
                    if (col.label) {
                        const label = col.label.trim().toLowerCase();
                        if (label.includes('clinic')) clinicIdx = index;
                        if (label.includes('patient id') || label.includes('patientid')) patientIdIdx = index;
                        if (label.includes('name')) nameIdx = index;
                        if (label.includes('age')) ageIdx = index; // 🎯 কলামের নাম Age-ই থাকবে
                        if (label.includes('gender')) genderIdx = index;
                    }
                });

                if (patientIdIdx === -1) {
                    showError("Patient ID Column missing in Sheet headers.");
                    return;
                }

                let record = null;

                for (let row of rows) {
                    if (!row.c || !row.c[patientIdIdx]) continue;
                    
                    const cellValue = row.c[patientIdIdx].v;
                    const patientIdValue = cellValue !== null ? String(cellValue).trim() : '';
                    
                    // সরাসরি Patient ID ম্যাচিং লজিক
                    if (patientIdValue === searchId.trim()) {
                        let rawAgeData = (ageIdx !== -1 && row.c[ageIdx]) ? row.c[ageIdx].f || row.c[ageIdx].v : '';
                        
                        record = {
                            clinic: (clinicIdx !== -1 && row.c[clinicIdx]) ? String(row.c[clinicIdx].v) : 'N/A',
                            patientId: patientIdValue,
                            name: (nameIdx !== -1 && row.c[nameIdx]) ? String(row.c[nameIdx].v) : 'N/A',
                            age: calculateExactAge(rawAgeData), // 🎯 বয়স অটো ক্যালকুলেট হবে এখান থেকে
                            gender: (genderIdx !== -1 && row.c[genderIdx]) ? String(row.c[genderIdx].v) : 'N/A'
                        };
                        break;
                    }
                }

                if (record) {
                    document.getElementById('data-clinic').innerText = record.clinic;
                    document.getElementById('data-patient-id').innerText = record.patientId;
                    document.getElementById('data-name').innerText = record.name;
                    document.getElementById('data-age').innerText = record.age;
                    document.getElementById('data-gender').innerText = record.gender;
                    
                    document.getElementById('status-msg').style.display = 'none';

                    // পেশেন্ট আইডি দিয়েই সরাসরি পিডিএফ ডাউনলোডের লিংক ম্যাপিং
                    const fileUrl = `${searchId}.pdf`;
                    const downloadBtn = document.getElementById('download-btn');
                    
                    downloadBtn.href = fileUrl;
                    downloadBtn.download = `Verified_File_${searchId}.pdf`; 
                    downloadBtn.style.display = 'inline-block';

                } else {
                    showError("Invalid Patient ID / Not Found");
                }
            })
            .catch(err => {
                console.error(err);
                showError("Database Connection Error. Check Sheet share access.");
            });
    } else {
        showError("No Patient ID Specified");
    }

    function showError(message) {
        document.getElementById('status-text').innerText = "Verification Failed";
        document.getElementById('status-text').style.color = "#e74c3c";
        document.getElementById('main-container').innerHTML = `<div class="error-container">${message}</div><p style="color:#7f8c8d; font-size:14px;">The document system could not verify this reference.</p>`;
    }
</script>

</body>
</html>
