<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Verified</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            background: white;
            max-width: 450px;
            width: 100%;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            text-align: center;
        }
        
        .status-title {
            color: #2ecc71;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .generated-date {
            color: #7f8c8d;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .section-heading {
            color: #000000;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        /* Table Design Matching Your Screenshot */
        .verification-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
            text-align: left;
            border: 1px solid #e2e8f0;
        }
        .verification-table tr {
            border-bottom: 1px solid #e2e8f0;
        }
        .verification-table tr:last-child {
            border-bottom: none;
        }
        .verification-table td {
            padding: 12px 15px;
            font-size: 14px;
            vertical-align: middle;
        }
        .verification-table td.label {
            background-color: #f8fafc;
            font-weight: 700;
            color: #2d3748;
            width: 35%;
            border-right: 1px solid #e2e8f0;
        }
        .verification-table td.value {
            color: #4a5568;
            font-weight: 500;
            word-break: break-word;
        }

        /* Download Button Styling */
        .btn-download {
            display: inline-block;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            padding: 12px 35px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 15px;
            transition: background-color 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,123,255,0.2);
        }
        .btn-download:hover {
            background-color: #0056b3;
        }
        
        .loading-text {
            color: #7f8c8d;
            font-size: 14px;
            font-style: italic;
        }
        .error-container {
            color: #e74c3c;
            font-weight: bold;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="status-title" id="status-text">QR Code Verified</div>
    <div class="generated-date" id="live-date">Checking Registry...</div>
    
    <div class="section-heading">Information stored in the QR:</div>
    
    <table class="verification-table">
        <tr>
            <td class="label">Clinic</td>
            <td class="value" id="data-clinic">Loading...</td>
        </tr>
        <tr>
            <td class="label">Patient ID</td>
            <td class="value" id="data-patient-id">Loading...</td>
        </tr>
        <tr>
            <td class="label">Patient Name</td>
            <td class="value" id="data-name">Loading...</td>
        </tr>
        <tr>
            <td class="label">Age</td>
            <td class="value" id="data-age">Loading...</td>
        </tr>
        <tr>
            <td class="label">Gender</td>
            <td class="value" id="data-gender">Loading...</td>
        </tr>
    </table>

    <a id="download-btn" class="btn-download" style="display: none;">Download File</a>
    <div id="status-msg" class="loading-text">Fetching secure data...</div>
</div>

<script>
    // =============================================================
    // 🛠️ আপনার GOOGLE SHEET-এর লিঙ্ক
    // =============================================================
    const GOOGLE_SHEET_URL = 'https://docs.google.com/spreadsheets/d/1TJW89LtijictTE4mEQICtobVBgoHy0Szco6C3_aUHWE/edit?usp=sharing'; 

    const baseSheetUrl = GOOGLE_SHEET_URL.replace(/\/edit.*/, '');
    const SHEET_URL = `${baseSheetUrl}/gviz/tq?tqx=out:json`;

    // URL থেকে আইডি (?id=1603245) নেওয়া, যা সরাসরি Patient ID-র সাথে মিলবে
    const urlParams = new URLSearchParams(window.location.search);
    const searchId = urlParams.get('id');

    // Live Date format
    const options = { year: 'numeric', month: 'short', day: 'numeric' };
    document.getElementById('live-date').innerText = "Generated on: " + new Date().toLocaleDateString('en-GB', options).replace(/ /g, '-') + " " + new Date().toLocaleTimeString('en-GB');

    if (searchId) {
        fetch(SHEET_URL)
            .then(res => res.text())
            .then(rawText => {
                const jsonClean = JSON.parse(rawText.substr(47).slice(0, -2));
                const rows = jsonClean.table.rows;
                
                let record = null;

                for (let row of rows) {
                    // 🎯 এখন কলাম C (Patient Id, ইনডেক্স ২) থেকে আইডি চেক করবে সরাসরি
                    const patientIdValue = row.c[2] ? String(row.c[2].v).trim() : '';
                    
                    if (patientIdValue === searchId.trim()) {
                        record = {
                            clinic: row.c[1] ? String(row.c[1].v) : 'N/A',
                            patientId: patientIdValue,
                            name: row.c[3] ? String(row.c[3].v) : 'N/A',
                            age: row.c[4] ? String(row.c[4].v) : 'N/A',
                            gender: row.c[5] ? String(row.c[5].v) : 'N/A'
                        };
                        break;
                    }
                }

                if (record) {
                    // ডেটা টেবিলে সেট করা
                    document.getElementById('data-clinic').innerText = record.clinic;
                    document.getElementById('data-patient-id').innerText = record.patientId;
                    document.getElementById('data-name').innerText = record.name;
                    document.getElementById('data-age').innerText = record.age;
                    document.getElementById('data-gender').innerText = record.gender;
                    
                    document.getElementById('status-msg').style.display = 'none';

                    // পিডিএফ ডাউনলোডের পাথ সেট করা (যেমন: 1603245.pdf)
                    const fileUrl = `${searchId}.pdf`;
                    const downloadBtn = document.getElementById('download-btn');
                    
                    downloadBtn.href = fileUrl;
                    downloadBtn.download = "Verified_File.pdf"; 
                    downloadBtn.style.display = 'inline-block';

                } else {
                    showError("Invalid Patient ID / Not Found");
                }
            })
            .catch(err => {
                console.error(err);
                showError("Database Connection Error. Please check Google Sheet Share access.");
            });
    } else {
        showError("No Patient ID Specified");
    }

    function showError(message) {
        document.getElementById('status-text').innerText = "Verification Failed";
        document.getElementById('status-text').style.color = "#e74c3c";
        document.getElementById('main-container').innerHTML = `<div class="error-container">${message}</div><p style="color:#7f8c8d; font-size:14px;">The document system could not verify this reference.</p>`;
    }
</script>

</body>
</html>
