<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Document Verification Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; max-width: 500px; width: 100%; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); border-top: 8px solid #0a3d62; text-align: center; }
        h2 { color: #0a3d62; font-size: 24px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        p.subtitle { color: #57606f; font-size: 14px; margin-bottom: 25px; font-weight: 500; }
        .badge { display: inline-flex; align-items: center; background-color: #ebfcf2; color: #10ac84; padding: 8px 20px; border-radius: 20px; font-weight: 600; font-size: 15px; margin-bottom: 30px; border: 1px solid #b7f4cf; }
        .badge::before { content: "✓"; margin-right: 8px; font-weight: bold; }
        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; text-align: left; }
        .info-table tr { border-bottom: 1px solid #eceff1; }
        .info-table td { padding: 15px 10px; font-size: 15px; color: #2c3e50; }
        .info-table td.label { font-weight: 500; color: #60a3bc; width: 40%; }
        .info-table td.value { font-weight: 600; text-align: right; }
        .status-ready { color: #10ac84; display: inline-flex; align-items: center; gap: 5px; }
        .status-ready::before { content: "●"; color: #10ac84; }
        .download-msg { font-size: 13px; color: #7f8c8d; margin-top: 15px; font-style: italic; }
        .btn-retry { display: inline-block; margin-top: 10px; color: #0a3d62; font-size: 13px; font-weight: 600; text-decoration: none; border-bottom: 1px dashed #0a3d62; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>Official Verification</h2>
    <p class="subtitle">Human Assets Training Institute</p>
    
    <div class="badge">Authenticity Verified</div>
    
    <table class="info-table">
        <tr>
            <td class="label">Document Track:</td>
            <td class="value" id="doc-id">Checking...</td>
        </tr>
        <tr>
            <td class="label">Link Status:</td>
            <td class="value status-ready">Secure & Ready</td>
        </tr>
    </table>

    <div class="download-msg" id="download-status">Preparing your download...</div>
    <a id="manual-link" class="btn-retry" style="display: none;">Click here if download doesn't start</a>
</div>

<script>
    // ১. URL থেকে ডাইনামিক আইডি (?id=003) খুঁজে নেওয়া
    const urlParams = new URLSearchParams(window.location.search);
    const docId = urlParams.get('id');

    const docIdElement = document.getElementById('doc-id');
    const downloadStatus = document.getElementById('download-status');
    const manualLink = document.getElementById('manual-link');

    if (docId) {
        // টেবিলে আইডি সেট করা
        docIdElement.innerText = docId;

        // আপনার রুট ফোল্ডারে থাকা ফাইলের নাম (যেমন: 003.pdf)
        const fileUrl = `${docId}.pdf`; 

        // ২. অটোমেটিক ডাউনলোড ট্রিগার করা
        setTimeout(() => {
            const anchor = document.createElement('a');
            anchor.href = fileUrl;
            anchor.download = "Verified File.pdf"; // ইউজার এই নামে ফাইলটি পাবে
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);

            // স্ট্যাটাস টেক্সট আপডেট
            downloadStatus.innerText = "Download started automatically.";
            
            // যদি অটো ডাউনলোড ব্লক হয়, তাহলে ম্যানুয়াল বাটন দেখাবে
            manualLink.href = fileUrl;
            manualLink.download = "Verified File.pdf";
            manualLink.style.display = "inline-block";
        }, 1500); // ১.৫ সেকেন্ড পর ডাউনলোড শুরু হবে

    } else {
        docIdElement.innerText = "No document specified";
        docIdElement.style.color = "#ff4d4d";
        downloadStatus.innerText = "Error: Invalid or missing document reference.";
    }
</script>

</body>
</html>
